<!DOCTYPE html>

<html lang="pl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<title>DoctorHub Web - Logowanie</title>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-slate-100 dark:border-slate-800 px-8 py-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center w-10 h-10 rounded-xl bg-primary text-white">
<span class="material-symbols-outlined text-2xl">medical_services</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">DoctorHub <span class="text-primary">Web</span></h2>
</div>
<div class="flex items-center gap-4">
<button class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">Pomoc techniczna</button>
<div class="h-8 w-[1px] bg-slate-200 dark:bg-slate-700"></div>
<div class="bg-primary/10 p-1 rounded-full">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-8" data-alt="Domyślny avatar użytkownika panelu medycznego" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAkl2qry5das8k5yJFJ5Zug-f4IOgW05TVdS31nQj6lnRotNOf4t6x09NSarkLlhmUxIJZ1RqvOIMZgG_q94b15MH7VGJZf20t1vNYHS86hbbXdXhGfmUjYW0pX0N4M0ekTlj9wSQrB-xL-W1dYezF-c-qnBDcYtgW1x31fPC0l74qIf-IXhPDUvbYnmhxEhAKvloBSkxn5faUAoYIIPAEXu7MFKpSu_bmmj1wp0A0zQIQOi6fOxDOwHOFfadNf4bm3HhhpYxgzpYcJ");'></div>
</div>
</div>
</header>
<!-- Main Content Section -->
<main class="flex-1 flex items-center justify-center p-6 sm:p-12">
<div class="w-full max-w-[480px] space-y-8 bg-white dark:bg-slate-900/50 p-8 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800">
<!-- Welcome Header -->
<div class="space-y-2 text-center">
<h1 class="text-slate-900 dark:text-white text-4xl font-black leading-tight tracking-tight">Witaj w DoctorHub</h1>
<p class="text-slate-500 dark:text-slate-400 text-lg font-normal">Zaloguj się do swojego panelu medycznego</p>
</div>
<!-- Login Form -->
<div class="space-y-6">
<!-- Login Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-800 dark:text-slate-200 font-semibold text-sm">ID Medyczne lub E-mail</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">person</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary h-14 pl-12 pr-4 text-base font-normal placeholder:text-slate-400 transition-all" placeholder="np. lekarz@doctorhub.pl" type="text" value=""/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-slate-800 dark:text-slate-200 font-semibold text-sm">Hasło</label>
<a class="text-sm font-medium text-primary hover:underline" href="#">Zapomniałeś hasła?</a>
</div>
<div class="flex w-full items-stretch rounded-xl relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors z-10">lock</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary h-14 pl-12 pr-12 text-base font-normal placeholder:text-slate-400 transition-all" placeholder="••••••••" type="password" value=""/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors z-10">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Checkbox -->
<div class="flex items-center justify-between">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 rounded border-slate-300 dark:border-slate-600 text-primary focus:ring-primary focus:ring-offset-0 bg-transparent transition-all" type="checkbox"/>
</div>
<span class="text-slate-700 dark:text-slate-300 text-base font-medium select-none group-hover:text-slate-900 dark:group-hover:text-white">Zapamiętaj to urządzenie</span>
</label>
</div>
<!-- Login Button -->
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold text-lg rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 hover:scale-[1.02] active:scale-[0.98]">
<span>Zaloguj się</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Footer Info -->
<div class="pt-8 border-t border-slate-200 dark:border-slate-800 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                            Nie masz jeszcze konta? 
                            <a class="text-primary font-bold hover:underline" href="#">Skontaktuj się z administratorem</a>
</p>
</div>
<!-- Security Badge -->
<div class="flex items-center justify-center gap-2 text-slate-400 dark:text-slate-600 text-xs font-medium uppercase tracking-widest pt-4">
<span class="material-symbols-outlined text-sm">verified_user</span>
                        Szyfrowane połączenie SSL
                    </div>
</div>
</main>
<!-- Bottom decorative element -->
<footer class="p-6 text-center text-slate-400 dark:text-slate-600 text-sm">
                © 2024 DoctorHub Systems. Wszelkie prawa zastrzeżone.
            </footer>
</div>
</div>
</body></html>
