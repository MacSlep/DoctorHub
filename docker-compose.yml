services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - ./backend/.env
    # depends_on:
    #   - mysql
    volumes:
      - ./backend:/app
      - /app/node_modules

